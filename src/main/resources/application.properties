spring.application.name=impression-backend

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/impression
spring.datasource.username=impression
spring.datasource.password=impression

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.flyway.enabled=true

# Limites upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# Compte admin simple (Basic Auth)
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# Logging pour debug
logging.level.fr.magasin.impression=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG